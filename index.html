<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://i.pinimg.com/736x/71/74/dc/7174dc14c0e9cc1bbf46854aa59c3069.jpg" class="avatar">
      <div>
        <span class="name">Katheriny</span>
        <span class="username">@katherinydepaula</span>
      </div>
    </div>

    <p class="post-text">
     A Barbie é a melhor 
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <div class="post-actions">
      <button id="DesBtn">Curtir</button>
      <span id="DesCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>ela tem todas as profissões</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>ela ama rosa</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
